name: rayman-test-lanes

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast-contract-linux:
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_rayman-reusable-lane.yml
    with:
      runs_on: '["ubuntu-latest"]'
      artifact_name: rayman-test-lanes-linux
      run_fast_contract: true
      run_pester: true
      run_bats: true

  fast-contract-windows:
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_rayman-reusable-lane.yml
    with:
      runs_on: '["windows-latest"]'
      artifact_name: rayman-test-lanes-windows
      run_fast_contract: true
      run_pester: true
      run_host_smoke: true
