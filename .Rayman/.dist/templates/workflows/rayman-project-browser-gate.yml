# Rayman managed workflow: generated by ./.Rayman/scripts/project/generate_project_workflows.ps1
name: rayman-project-browser-gate

on:
  pull_request:
    paths:
{{BROWSER_PATHS}}
  push:
    branches:
      - main
      - master
    paths:
{{BROWSER_PATHS}}
  workflow_dispatch:

jobs:
  browser-gate-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rayman browser gate dependencies
        shell: bash
        run: |
          python3 -m pip install --upgrade pip jsonschema

      - name: Run Rayman browser gate
        shell: pwsh
        run: |
          ./.Rayman/rayman.ps1 browser-gate

      - name: Upload Rayman browser gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: {{ARTIFACT_PREFIX}}-browser-gate-linux
          path: |
            .Rayman/runtime/project_gates/**
            .Rayman/runtime/*.json
            .Rayman/logs/**
