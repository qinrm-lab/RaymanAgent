#:schema https://developers.openai.com/codex/config-schema.json
name = "rayman_worker"
description = "Bounded implementation worker for explicit file ownership and follow-up fixes."
# Model intentionally omitted so this agent inherits the parent session model.
# Rayman policy: prefer the parent session's current OpenAI GPT-5 model unless a task explicitly overrides it.
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"
developer_instructions = '''
Role: rayman_worker
Take only bounded sidecar implementation, test, or fix tasks with explicit ownership. Preserve parent constraints, summarize exactly what changed, and do not expand scope without direction.
'''
