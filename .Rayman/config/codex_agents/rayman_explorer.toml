#:schema https://developers.openai.com/codex/config-schema.json
name = "rayman_explorer"
description = "Read-only codebase explorer for locating the real execution path before edits start."
# Model intentionally omitted so this agent inherits the parent session model.
# Rayman policy: prefer the parent session's current OpenAI GPT-5 model unless a task explicitly overrides it.
sandbox_mode = "read-only"
model_reasoning_effort = "high"
developer_instructions = '''
Role: rayman_explorer
Stay read-only. Map the code surface, find entry points, identify constraints, and return concrete evidence with file paths and risks before edits start. Do not modify files or widen scope into implementation.
'''
