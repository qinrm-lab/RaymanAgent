# Rayman managed workflow: generated by ./.Rayman/scripts/project/generate_project_workflows.ps1
name: rayman-project-full-gate

on:
  pull_request:
    paths:
{{FULL_PATHS}}
  push:
    branches:
      - main
      - master
    paths:
{{FULL_PATHS}}
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-gate-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rayman full gate dependencies
        shell: bash
        run: |
          python3 -m pip install --upgrade pip jsonschema

      - name: Run Rayman full gate
        shell: pwsh
        run: |
          ./.Rayman/rayman.ps1 full-gate

      - name: Upload Rayman full gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: {{ARTIFACT_PREFIX}}-full-gate-linux
          path: |
            .Rayman/runtime/project_gates/**
            .Rayman/runtime/*.json
            .Rayman/state/**
            .Rayman/logs/**
{{WINDOWS_FULL_JOB}}
