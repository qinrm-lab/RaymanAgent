name: rayman-nightly-smoke

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hosted-windows-smoke:
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_rayman-reusable-lane.yml
    with:
      runs_on: '["windows-latest"]'
      artifact_name: rayman-nightly-hosted-windows
      run_host_smoke: true
      host_smoke_args: "-IncludeWsl"
      run_copy_smoke: true
      copy_smoke_args: "-Strict -Scope host -TimeoutSeconds 180"

  self-hosted-windows-deep-smoke:
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/_rayman-reusable-lane.yml
    timeout-minutes: 60
    with:
      runs_on: '["self-hosted","windows","rayman"]'
      artifact_name: rayman-nightly-self-hosted
      run_host_smoke: true
      host_smoke_args: "-IncludeWsl -IncludeSandbox -RequireEnvironment"
